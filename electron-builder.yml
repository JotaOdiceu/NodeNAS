appId: com.nodenas.app
productName: NodeNAS
copyright: Copyright © 2026 Jota Odiceu

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - node_modules/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish: null
